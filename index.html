<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PPER / IDEP-RO — Painel de Comando PROPAG 2026</title>
<style>
:root{--bg:#f0f3f7;--sf:#fff;--teal:#00897b;--tl:#e0f2f1;--tb:#f1faf9;--red:#c62828;--rb:#fef2f2;--amb:#e65100;--ab:#fff8e1;--grn:#2e7d32;--gb:#f1f8e9;--tx:#1a2332;--t2:#37474f;--mt:#78909c;--bd:#e2e8f0;--nv:#0d1b2a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes gr{from{width:0}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 16px}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start}
.hd-l{font-size:8px;color:var(--mt);letter-spacing:1.5px;text-transform:uppercase}
.hd-t{font-size:19px;font-weight:800;color:var(--nv);margin-top:2px}.hd-t span{color:var(--teal)}
.hd-s{font-size:9px;color:var(--mt);margin-top:1px}
.mb{background:var(--tl);border-radius:10px;padding:8px 12px;text-align:right}
.mb-l{font-size:8px;color:var(--teal);font-weight:700;letter-spacing:1px}
.mb-v{font-size:22px;font-weight:800;color:var(--teal)}
.mb-s{font-size:8px;color:var(--mt)}
.pb{margin-top:10px;height:6px;border-radius:3px;background:#e8f5e9;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--grn));animation:gr 1s ease}
.pl{display:flex;justify-content:space-between;font-size:8px;color:var(--mt);margin-top:3px}
.pl .td{color:var(--amb);font-weight:700}
.ks{display:flex;gap:8px;margin-top:10px}
.k{flex:1;border-radius:8px;padding:8px;text-align:center}
.kl{font-size:7px;color:var(--mt)}.kv{font-size:14px;font-weight:800;margin-top:2px}
.tabs{display:flex;gap:3px;margin-top:10px;background:var(--bg);border-radius:10px;padding:3px}
.tab{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;color:var(--mt);transition:.2s}
.tab.a{background:var(--teal);color:#fff}
.mn{padding:12px 16px 80px}
.sh{display:none}.sv{display:block;animation:fi .3s}
.sc{display:flex;align-items:center;gap:6px;margin:4px 0 8px}
.sc-b{width:3px;height:13px;border-radius:2px;background:var(--teal)}
.sc-t{font-size:11px;font-weight:700}
.ms{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.mc{min-width:145px;background:var(--sf);border-radius:10px;padding:10px;border:1px solid var(--bd);flex-shrink:0}
.md{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.dot{width:6px;height:6px;border-radius:50%}.dot.on{animation:bl 2s infinite}
.ml{font-size:8px;font-weight:700}.mn2{font-size:11px;font-weight:700}.ml2{font-size:9px;color:var(--mt);margin-top:2px}
.ma{font-size:9px;color:var(--teal);font-weight:600;margin-top:3px}
.mu{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:5px;cursor:pointer;transition:.15s}
.mu.op{border-color:var(--teal)}
.mu-t{display:flex;justify-content:space-between;align-items:center}
.mu-n{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.mu-p{font-size:9px;color:var(--mt)}
.mu-v{font-size:15px;font-weight:800}
.mu-r{font-size:8px;color:var(--mt)}
.mu-b{height:3px;border-radius:2px;margin-top:6px}
.mu-bf{height:100%;border-radius:2px}
.mu-d{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);display:none;grid-template-columns:1fr 1fr;gap:6px;font-size:9px}
.mu.op .mu-d{display:grid;animation:fi .2s}
.mu-al{margin-top:8px;padding:8px;background:var(--rb);border-radius:6px;font-size:9px;color:var(--red);grid-column:span 2}
.il{color:var(--mt)}.iv{font-weight:700}
.ft{display:flex;gap:6px;margin-bottom:12px}
.fb{padding:6px 12px;border:1px solid var(--bd);border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;background:var(--sf);color:var(--mt)}
.fb.a{border-color:var(--teal);background:var(--tl);color:var(--teal)}
.cc{background:var(--sf);border-radius:10px;padding:11px 12px;border:1px solid var(--bd);margin-bottom:5px}
.cc-t{display:flex;justify-content:space-between;align-items:flex-start}
.cc-n{font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px}
.cc-tg{font-size:7px;font-weight:700;color:var(--teal);background:var(--tl);padding:1px 5px;border-radius:3px}
.cc-eixo{font-size:7px;font-weight:600;color:#fff;padding:1px 5px;border-radius:3px;background:var(--mt)}
.cc-l{font-size:8px;color:var(--mt);margin-top:2px}
.cc-m{text-align:right;flex-shrink:0}.cc-mv{font-size:14px;font-weight:800}.cc-ml{font-size:7px;color:var(--mt)}
.cc-s{display:flex;gap:10px;margin-top:6px;font-size:9px}
.pc{display:flex;align-items:center;gap:10px;border-radius:8px;padding:10px 12px;margin-bottom:5px;border-left:3px solid}
.pc-i{flex:1}.pc-l{font-size:10px;font-weight:700}.pc-a{font-size:9px;color:var(--t2);margin-top:1px}
.pc-t{font-size:8px;font-weight:700;color:#fff;border-radius:4px;padding:2px 6px}
.an{background:var(--tb);border-radius:8px;padding:9px 12px;border:1px solid rgba(0,137,123,.2);margin:4px 0 14px;font-size:9px;color:var(--t2);line-height:1.5}
.ab{border-radius:10px;padding:12px;margin-bottom:12px}
.ab-t{font-size:11px;font-weight:700}.ab-x{font-size:9px;color:var(--t2);line-height:1.5;margin-top:3px}
.ac{background:var(--sf);border-radius:10px;padding:12px;border:1px solid var(--bd);margin-bottom:6px}
.ac-t{display:flex;justify-content:space-between}
.ac-id{font-size:12px;font-weight:700;font-family:monospace}
.ac-c{font-size:9px;color:var(--mt);margin-top:1px}
.ac-r{text-align:center;border-radius:6px;padding:3px 8px}
.ac-rv{font-size:14px;font-weight:800}.ac-rl{font-size:7px;font-weight:600}
.ac-s{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;font-size:9px}
.ac-p{margin-top:6px;padding:6px 8px;border-radius:6px;font-size:9px}
.fi{background:var(--sf);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-top:12px}
.fi-t{font-size:11px;font-weight:700;margin-bottom:8px}
.fi-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi-l{font-size:8px;color:var(--mt)}.fi-n{font-size:18px;font-weight:800}
.fi-f{grid-column:span 2;padding-top:6px;border-top:1px solid var(--bd)}
.fi-b{font-size:20px;font-weight:800;color:var(--red)}
.rc{background:var(--sf);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:12px}
.ri{font-size:9px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.rx{background:var(--bg);border-radius:6px;padding:6px 8px}
.rxl{font-size:7px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.rxv{font-size:9px;font-weight:600}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:11px;font-weight:800;cursor:pointer}
.btn.ok{background:var(--grn)}
.rp{background:#fff;color:#1a1a1a;border-radius:10px;padding:18px;border:1px solid var(--bd);box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fi .3s;margin-bottom:12px}
.rp-h{text-align:center;margin-bottom:12px}
.rp table{width:100%;font-size:8px;border-collapse:collapse;margin:4px 0}
.rp th{text-align:right;padding:2px 3px;color:#666;border-bottom:1px solid #ccc}
.rp th:first-child{text-align:left}
.rp td{padding:2px 3px;border-bottom:1px solid #f0f0f0}
.rp td:not(:first-child){text-align:right}
.ci{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)}
.ci:last-child{border-bottom:none}
.cic{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.cic.ok{background:var(--grn);color:#fff}.cic.pd{background:var(--ab);color:var(--amb)}
.cit{font-size:9px}.cit.ok{color:var(--tx)}.cit.pd{color:var(--mt)}
.badge{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:5px 14px;font-size:8px;color:var(--mt);font-weight:600;letter-spacing:1px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:100}
.k2{flex:1;background:var(--sf);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--bd)}
.k2l{font-size:7px;color:var(--mt)}.k2v{font-size:15px;font-weight:800;margin-top:2px}
.orc{background:var(--tb);border:1px solid rgba(0,137,123,.15);border-radius:8px;padding:10px 12px;margin-bottom:14px}
.orc-t{font-size:10px;font-weight:700;color:var(--teal);margin-bottom:6px}
.orc-r{display:flex;justify-content:space-between;font-size:9px;padding:3px 0;border-bottom:1px solid rgba(0,137,123,.1)}
.orc-r:last-child{border-bottom:none}
.orc-l{color:var(--t2)}.orc-v{font-weight:700;color:var(--teal)}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-top">
    <div>
      <div class="hd-l">Programa de Permanência e Êxito com Rastreabilidade</div>
      <h1 class="hd-t">PPER <span>/ IDEP-RO</span></h1>
      <div class="hd-s">Painel de Comando • PROPAG 2026 (Out/25–Out/26) • LC 212/2025</div>
    </div>
    <div class="mb">
      <div class="mb-l">META PROPAG</div>
      <div class="mb-v" id="hPct"></div>
      <div class="mb-s" id="hRat"></div>
    </div>
  </div>
  <div class="pb"><div class="pf" id="hBar"></div></div>
  <div class="pl"><span>Out 2025</span><span class="td">Mar 2026 — Hoje</span><span>Out 2026</span></div>
  <div class="ks">
    <div class="k" style="background:var(--tl)"><div class="kl">Meta matrículas</div><div class="kv" style="color:var(--teal)">2.220</div></div>

    <div class="k" style="background:var(--rb)"><div class="kl">Alunos em risco</div><div class="kv" style="color:var(--red)" id="hRisco"></div></div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab a" onclick="st('cmd',this)">Comando</button>
    <button class="tab" onclick="st('cur',this)">Cursos EPT</button>
    <button class="tab" onclick="st('reg',this)">Registro</button>
    <button class="tab" onclick="st('per',this)">Permanência</button>
    <button class="tab" onclick="st('rel',this)">Prestação</button>
  </div>
</header>

<main class="mn">

  <div id="t-cur" class="sh"></div>
  <div id="t-reg" class="sh"></div>
  <div id="t-per" class="sh"></div>

  { nome:"Tec. em Agroecologia", eixo:"Recursos Naturais", mat:55, conc:28, risco:2, local:"CENTEC Abaitará", turno:"Integral", turmas:2 },

const MUNICIPIOS = [

const MOVEIS = [

const pct = ((tAt/META_TOTAL)*100).toFixed(1);

function st(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('a'));

  ['cmd','cur','reg','per','rel'].forEach(t=>{document.getElementById('t-'+t).className=t===id?'sv':'sh'});

// ===== COMANDO =====
function rCmd(){
  let h='<div class="sc"><div class="sc-b"></div><span class="sc-t">Escolas Móveis — Educação sobre Rodas</span></div><div class="ms">';

  });
  h+='</div>';

  // Orçamento resumo — itens 8 e 10 do PA
  h+=`<div class="orc"><div class="orc-t">Orçamento PROPAG 2026 — Plano de Aplicação IDEP</div>
    <div class="orc-r"><span class="orc-l">Total aprovado</span><span class="orc-v">R$ 35.874.800</span></div>
    <div class="orc-r"><span class="orc-l">Item 8 — Permanência e Êxito</span><span class="orc-v">R$ 3.367.800</span></div>
    <div class="orc-r"><span class="orc-l">Item 10 — Governança e Monitoramento</span><span class="orc-v">R$ 50.000</span></div>
    <div class="orc-r"><span class="orc-l">Item 3 — Oferta cursos (R$8.000/mat.)</span><span class="orc-v">R$ 17.760.000</span></div>
    <div class="orc-r"><span class="orc-l">Custo por matrícula previsto</span><span class="orc-v">R$ 8.000</span></div>
  </div>`;

  h+='<div class="sc"><div class="sc-b"></div><span class="sc-t">Municípios — Progresso Meta PROPAG (2.220 matrículas)</span></div>';
  MUNICIPIOS.forEach((m,i)=>{
    const p=((m.at/m.meta)*100).toFixed(0);
    const c=p>=90?'var(--grn)':p>=60?'var(--amb)':'var(--red)';
    h+=`<div class="mu" onclick="this.classList.toggle('op')" style="animation:si .2s ease ${i*.02}s both">
      <div class="mu-t"><div><div class="mu-n">${m.t==='movel'?'🚛 ':''}${m.n}</div><div class="mu-p">${m.polo}</div></div><div style="text-align:right"><div class="mu-v" style="color:${c}">${p}%</div><div class="mu-r">${m.at}/${m.meta}</div></div></div>
      <div class="mu-b" style="background:${c}20"><div class="mu-bf" style="width:${Math.min(p,100)}%;background:${c}"></div></div>
      <div class="mu-d">
        <div><span class="il">Faltam: </span><span class="iv" style="color:var(--amb)">${m.meta-m.at} mat.</span></div>
        <div><span class="il">Em risco: </span><span class="iv" style="color:${m.ri>5?'var(--red)':'var(--grn)'}">${m.ri} alunos</span></div>
        <div><span class="il">Projeção out/26: </span><span class="iv" style="color:var(--teal)">${Math.min(m.meta,Math.round(m.at*1.8))}</span></div>
        <div><span class="il">Protocolo: </span><span class="iv" style="color:${m.ri>5?'var(--red)':'var(--teal)'}">${m.ri>5?'Nível 2-3':'Nível 1'}</span></div>
        ${m.ri>5?`<div class="mu-al">⚠ ${m.ri} alunos em risco elevado. Intervenção PPER ativa.</div>`:''}
      </div></div>`;
  });
  document.getElementById('t-cmd').innerHTML=h;
}

// ===== CURSOS =====
let filt='todos';
function rCur(f){
  filt=f||filt;
  const eixos=[...new Set(CURSOS.map(c=>c.eixo))];
  const lista=filt==='todos'?CURSOS:CURSOS.filter(c=>c.eixo===filt);
  const tM=CURSOS.reduce((s,c)=>s+c.mat,0);
  const tC=CURSOS.reduce((s,c)=>s+c.conc,0);
  const tR=CURSOS.reduce((s,c)=>s+c.risco,0);
  const tT=CURSOS.reduce((s,c)=>s+c.turmas,0);

  let h='<div class="sc"><div class="sc-b"></div><span class="sc-t">Cursos PROPAG 2026 — Plano de Aplicação Oficial</span></div>';
  h+=`<div style="display:flex;gap:6px;margin-bottom:12px">
    <div class="k2"><div class="k2l">Matrículas ativas</div><div class="k2v" style="color:var(--teal)">${tM}</div></div>
    <div class="k2"><div class="k2l">Meta total</div><div class="k2v" style="color:var(--nv)">${META_TOTAL}</div></div>
    <div class="k2"><div class="k2l">${tT} turmas</div><div class="k2v" style="color:var(--grn)">${CURSOS.length} cursos</div></div>
  </div>`;

  // Eixo filters
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">';
  h+=`<button class="fb ${filt==='todos'?'a':''}" onclick="rCur('todos')">Todos</button>`;
  eixos.forEach(e=>{
    const short=e.length>15?e.substring(0,15)+'…':e;
    h+=`<button class="fb ${filt===e?'a':''}" onclick="rCur('${e}')">${short}</button>`;
  });
  h+='</div>';

  lista.forEach((c,i)=>{
    const p=c.mat>0?((c.conc/c.mat)*100).toFixed(0):0;
    const eixoCor = c.eixo.includes('Gestão')?'#1565c0':c.eixo.includes('Turismo')?'#6a1b9a':c.eixo.includes('Saúde')?'#c62828':c.eixo.includes('Infra')?'#e65100':c.eixo.includes('Naturais')?'#2e7d32':c.eixo.includes('Educacional')?'#00838f':'var(--mt)';
    h+=`<div class="cc" style="animation:si .2s ease ${i*.02}s both">
      <div class="cc-t"><div>
        <div class="cc-n">${c.nome}</div>
        <div class="cc-l"><span class="cc-eixo" style="background:${eixoCor}">${c.eixo}</span> ${c.local} • ${c.turno} • ${c.turmas} turmas</div>
      </div><div class="cc-m"><div class="cc-mv">${c.mat}</div><div class="cc-ml">matrículas</div></div></div>
      <div class="cc-s">
        <span style="color:var(--grn)">✓ ${c.conc} concluídos (${p}%)</span>
        ${c.risco>0?`<span style="color:${c.risco>8?'var(--red)':'var(--amb)'}">⚠ ${c.risco} em risco</span>`:''}
      </div></div>`;
  });
  document.getElementById('t-cur').innerHTML=h;
}

// ===== PERMANÊNCIA =====
function rPer(){
  let h='<div class="sc"><div class="sc-b"></div><span class="sc-t">Protocolo de Intervenção — PPER</span></div>';
  h+=`<div style="font-size:9px;color:var(--t2);margin-bottom:8px;line-height:1.5">Conforme <strong>Item 8</strong> do Plano de Aplicação: "Implementação de ações de acesso, permanência e êxito" — orçamento aprovado: <strong style="color:var(--teal)">R$ 3.367.800</strong></div>`;

  [1,2,3].forEach(n=>{const p=PROTO[n];h+=`<div class="pc" style="background:${p.bg};border-left-color:${p.c}"><div class="pc-i"><div class="pc-l" style="color:${p.c}">${p.l}</div><div class="pc-a">${p.a}</div></div><span class="pc-t" style="background:${p.c}">${p.t}</span></div>`;});
  h+='<div class="an">Cada ação gera <strong style="color:var(--teal)">registro com data, hora, responsável e resultado</strong> — rastreável para auditoria TCE-RO. Conforme Item 10 do PA: "Implantação de governança, monitoramento e prestação de contas".</div>';

  h+=`<div class="ab" style="background:var(--rb);border:1px solid rgba(198,40,40,.2)">
    <div class="ab-t" style="color:var(--red)">⚠ ${ALUNOS.length} alunos com risco elevado de evasão</div>
    <div class="ab-x">Probabilidade superior a 65% de abandono nos próximos 30 dias. Protocolo PPER acionado. Cada matrícula perdida = R$ 8.000 de recurso PROPAG não validado.</div></div>`;

  h+='<div class="sc"><div class="sc-b"></div><span class="sc-t">Alunos em Risco — Protocolo Ativo</span></div>';
  ALUNOS.forEach((a,i)=>{
    const p=PROTO[a.nv];const rc=a.risco>85?'var(--red)':a.risco>75?'var(--amb)':'#f9a825';
    h+=`<div class="ac" style="border-left:3px solid ${p.c};animation:si .2s ease ${i*.04}s both">
      <div class="ac-t"><div><div class="ac-id">${a.id}</div><div class="ac-c">${a.curso} • ${a.polo}</div></div><div class="ac-r" style="background:${rc}15"><div class="ac-rv" style="color:${rc}">${a.risco}%</div><div class="ac-rl" style="color:${rc}">RISCO</div></div></div>
      <div class="ac-s"><div><span style="color:var(--mt)">Frequência: </span><strong style="color:${a.freq<55?'var(--red)':'var(--amb)'}">${a.freq}%</strong></div><div><span style="color:var(--mt)">Dias ausente: </span><strong style="color:${a.dias>7?'var(--red)':'var(--amb)'}">${a.dias}</strong></div></div>
      <div class="ac-p" style="background:${p.bg}"><span style="font-weight:700;color:${p.c}">${p.l}: </span><span style="color:var(--t2)">${p.a}</span></div></div>`;
  });

  h+=`<div class="fi"><div class="fi-t">Impacto Fiscal — Recurso PROPAG em Risco</div>
    <div class="fi-g">
      <div><div class="fi-l">Matrículas em risco</div><div class="fi-n" style="color:var(--red)">${ALUNOS.length}</div></div>
      <div><div class="fi-l">Custo/matrícula (PA Item 3)</div><div class="fi-n" style="color:var(--amb)">R$ 8.000</div></div>
      <div class="fi-f"><div class="fi-l">Recurso PROPAG em risco direto (Art. 5°, §2°, VII — LC 212/2025)</div><div class="fi-b">R$ ${(ALUNOS.length*8000).toLocaleString('pt-BR')}</div></div>
    </div>
    <div style="margin-top:6px;font-size:8px;color:var(--mt)">Referência: R$8.000/matrícula conforme Item 3 do Cronograma Físico-Financeiro do Plano de Aplicação IDEP.</div></div>`;
  document.getElementById('t-per').innerHTML=h;
}

// ===== PRESTAÇÃO =====
function rRel(){
  let h='<div class="sc"><div class="sc-b"></div><span class="sc-t">Prestação de Contas — PROPAG (Out/25 – Out/26)</span></div>';
  h+=`<div class="rc">
    <div class="ri">Art. 7° da LC 212/2025 e Art. 71 do Decreto 12.433/2025: publicação semestral ao <strong>TCE-RO</strong> e <strong>Assembleia Legislativa</strong>. Conforme <strong>Item 10</strong> do Plano de Aplicação: "Implantação de governança, monitoramento e prestação de contas — relatórios trimestrais, painéis de indicadores e relatório anual".</div>
    <div class="rg">
      <div class="rx"><div class="rxl">Período</div><div class="rxv">Out/25–Mar/26 (1° sem.)</div></div>
      <div class="rx"><div class="rxl">Destino</div><div class="rxv">TCE-RO / ALERO / DIOF</div></div>
      <div class="rx"><div class="rxl">Base legal</div><div class="rxv">LC 212/2025 + Dec. 12.433</div></div>
      <div class="rx"><div class="rxl">Portaria MEC</div><div class="rxv">930/2025 (Setec)</div></div>
    </div>
    <button class="btn" id="btnG" onclick="gR()">Gerar Relatório Semestral PROPAG</button>
  </div><div id="rC"></div>`;

  h+=`<div class="rc"><div style="font-size:11px;font-weight:700;margin-bottom:8px">Checklist de Conformidade — Plano de Aplicação PROPAG</div>`;
  [
    ["Meta 2.220 matrículas registradas no SISTEC",false],
    ["52 municípios com oferta mapeada (Indicador 1)",true],
    ["100% unidades vistoriadas (Indicador 2)",true],
    ["Protocolo PPER ativo — Item 8 PA",true],
    ["60% recursos em EPTNM (Art. 5°, §2°, III)",true],
    ["Plano de Aplicação enviado à Setec/MEC",true],
    ["Sistema de Acompanhamento — Item 10.1",false],
    ["Ferramenta Prestação de Contas — Item 10.2",false],
    ["Relatório semestral ao TCE-RO (Art. 7°)",false],
    ["Relatório à Assembleia Legislativa",false],
    ["Publicação no Diário Oficial",false],
  ].forEach(([t,ok])=>{h+=`<div class="ci"><span class="cic ${ok?'ok':'pd'}">${ok?'✓':'○'}</span><span class="cit ${ok?'ok':'pd'}">${t}</span></div>`;});
  h+='</div>';
  document.getElementById('t-rel').innerHTML=h;
}

function gR(){
  const b=document.getElementById('btnG');b.className='btn ok';b.textContent='✓ Relatório gerado';
  const now=new Date();
  let rows='';MUNICIPIOS.slice(0,12).forEach(m=>{const p=((m.at/m.meta)*100).toFixed(0);rows+=`<tr><td>${m.n}</td><td>${m.meta}</td><td>${m.at}</td><td style="font-weight:600">${p}%</td><td style="color:${m.ri>5?'#c62828':'#333'}">${m.ri}</td></tr>`;});
  document.getElementById('rC').innerHTML=`<div class="rp">
    <div class="rp-h"><div style="font-size:8px;color:#888;letter-spacing:2px;text-transform:uppercase">Estado de Rondônia • IDEP / SEDUC</div>
    <div style="font-size:13px;font-weight:800;margin-top:4px">RELATÓRIO DE PRESTAÇÃO DE CONTAS</div>
    <div style="font-size:10px;font-weight:600;color:#555">PROPAG — LC 212/2025 • Decreto 12.433/2025 • Portaria MEC 930/2025</div>
    <div style="font-size:8px;color:#888;margin-top:2px">Out/25–Mar/26 • Destinatário: TCE-RO / ALERO</div></div>
    <div style="border-top:2px solid #111;padding:5px 0 3px"><span style="font-size:10px;font-weight:700">1. RESUMO EXECUTIVO</span></div>
    <p style="font-size:9px;color:#333;line-height:1.6;margin:6px 0 10px">O IDEP alcançou <strong>${pct}%</strong> da meta anual de 2.220 matrículas EPTNM, com <strong>${tAt.toLocaleString('pt-BR')}</strong> matrículas ativas (frequência validada) em ${MUNICIPIOS.length > 14 ? '52 municípios' : MUNICIPIOS.length+' pontos'}. O PPER registrou ${ALUNOS.length} alunos em risco com protocolo de intervenção ativo em 3 níveis. Investimento executado conforme Cronograma Físico-Financeiro do PA (R$ ${(ORCAMENTO_TOTAL/1000000).toFixed(1)}M).</p>
    <div style="border-top:1px solid #ddd;padding:5px 0 3px"><span style="font-size:10px;font-weight:700">2. DISTRIBUIÇÃO POR MUNICÍPIO/POLO</span></div>
    <table><thead><tr><th style="text-align:left">Município</th><th>Meta</th><th>Atual</th><th>%</th><th>Risco</th></tr></thead><tbody>${rows}</tbody></table>
    <div style="font-size:7px;color:#999;font-style:italic">* Resumido. Completo: 52 municípios + 6 escolas móveis + parcerias §7°.</div>
    <div style="border-top:1px solid #ddd;padding:5px 0 3px;margin-top:8px"><span style="font-size:10px;font-weight:700">3. AÇÕES DE PERMANÊNCIA (PPER — Item 8 PA)</span></div>
    <p style="font-size:9px;color:#333;line-height:1.6">Protocolo registrou 47 ações Nível 1, 18 Nível 2 e 8 Nível 3. Taxa de retorno pós-intervenção: 68%. Orçamento executado do Item 8: R$ 1.248.000 de R$ 3.367.800 previstos.</p>
    <div style="margin-top:10px;padding:7px;background:#f5f5f5;border-radius:6px;font-size:8px;color:#666"><strong>Gerado automaticamente</strong> — PPER/IDEP em ${now.toLocaleDateString('pt-BR')} • Art. 7° LC 212/2025 • Decreto 12.433/2025</div></div>`;
}

// INIT
rCmd();rCur('todos');rPer();rRel();
</script>
